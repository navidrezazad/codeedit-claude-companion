name: Bug report
description: Report something not working in the remote companion prototype.
title: "[Bug]: "
labels: bug

body:
  - type: textarea
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Include whether the issue is on the Mac app, iOS app, terminal mirror, or MD Stream view.
      placeholder: |
        1. Open CodeEditV2 on macOS.
        2. Connect from the iOS app.
        3. Attach to a terminal session.
        4. Observe the issue.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Environment
      value: |
        macOS:
        iOS:
        Xcode:
        Connection mode: Local / Direct IP / VPN

  - type: textarea
    attributes:
      label: Additional context
      description: Screenshots or logs are useful, but remove passcodes, tokens, IPs, and private project data.
